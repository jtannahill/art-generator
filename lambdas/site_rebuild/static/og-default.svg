<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Abstract color splashes inspired by the project -->
  <circle cx="200" cy="180" r="120" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="350" cy="300" r="80" fill="#f87171" opacity="0.5"/>
  <circle cx="150" cy="400" r="100" fill="#38bdf8" opacity="0.4"/>
  <circle cx="900" cy="150" r="90" fill="#fbbf24" opacity="0.5"/>
  <circle cx="1000" cy="350" r="130" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="850" cy="480" r="70" fill="#34d399" opacity="0.4"/>
  <ellipse cx="500" cy="250" rx="60" ry="120" fill="#818cf8" opacity="0.3" transform="rotate(-20 500 250)"/>
  <ellipse cx="700" cy="400" rx="100" ry="50" fill="#f472b6" opacity="0.25" transform="rotate(15 700 400)"/>
  <!-- Title -->
  <text x="600" y="290" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#ffffff">art.jt</text>
  <text x="600" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#aaaaaa">Generative Weather Art</text>
  <text x="600" y="390" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#666666">Daily artwork from real atmospheric data</text>
</svg>
